<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e10;
      color: #e8e8ed;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      height: 100%;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid #2a2a30;
    }

    .panel {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 12px;
      gap: 8px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 14px;
      color: #7c6af7;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #7c6af7;
      box-shadow: 0 0 6px rgba(124,106,247,0.6);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 6px rgba(124,106,247,0.5); }
      50% { box-shadow: 0 0 12px rgba(124,106,247,0.9); }
    }

    .close {
      background: transparent;
      border: none;
      color: #555560;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .close:hover { color: #e8e8ed; }

    .query-label {
      font-size: 10px;
      color: #555560;
      font-family: monospace;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    .query-text {
      color: #7c6af7;
      font-size: 11px;
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    .results {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 5px;
      scrollbar-width: none;
    }

    .results::-webkit-scrollbar { display: none; }

    .card {
      background: #17171a;
      border: 1px solid #1e1e24;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      display: block;
    }

    .card:hover {
      background: #1e1e23;
      border-color: #2a2a30;
      transform: translateX(2px);
    }

    .card-title {
      font-size: 11.5px;
      font-weight: 500;
      color: #e8e8ed;
      line-height: 1.3;
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-domain {
      font-family: monospace;
      font-size: 9px;
      color: #555560;
    }

    .card-score {
      font-family: monospace;
      font-size: 9px;
      color: #7c6af7;
      background: rgba(124,106,247,0.15);
      border-radius: 3px;
      padding: 1px 4px;
    }

    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 6px;
      color: #555560;
      text-align: center;
      padding: 12px;
    }

    .empty-icon { font-size: 24px; opacity: 0.4; }
    .empty-text { font-size: 11px; line-height: 1.5; }

    .loading {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
    }

    .skeleton {
      height: 52px;
      background: #17171a;
      border-radius: 8px;
      animation: shimmer 1.4s ease-in-out infinite;
      background: linear-gradient(90deg, #17171a 25%, #1f1f25 50%, #17171a 75%);
      background-size: 200% 100%;
    }

    @keyframes shimmer {
      0% { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    .footer {
      flex-shrink: 0;
      padding-top: 6px;
      border-top: 1px solid #1e1e24;
    }

    .full-btn {
      width: 100%;
      padding: 7px;
      background: rgba(124,106,247,0.15);
      border: 1px solid rgba(124,106,247,0.3);
      border-radius: 7px;
      color: #7c6af7;
      font-size: 11.5px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .full-btn:hover {
      background: rgba(124,106,247,0.25);
    }

    mark {
      background: rgba(124,106,247,0.2);
      color: #7c6af7;
      border-radius: 2px;
      padding: 0 1px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <div class="logo">
        <div class="dot"></div>
        LocalMind
      </div>
      <button class="close" id="closeBtn">✕</button>
    </div>

    <div class="query-label">Memory results for</div>
    <div class="query-text" id="queryText">…</div>

    <div class="results" id="results">
      <div class="loading">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </div>


  </div>

  <script src="injected-panel.js"></script>
</body>
</html>
